id = "herdr-picker-plus"
name = "Picker Plus"
version = "0.2.0"
min_herdr_version = "0.7.0"
description = "Move anywhere in your Herdr workflow: search workspaces, SSH servers, agents, projects, actions, directories, and plugin integrations from one native picker."
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[actions]]
id = "open"
title = "Picker Plus: open"
contexts = ["workspace", "global"]
command = ["./target/release/herdr-picker-plus", "open"]

[[panes]]
id = "picker"
title = "Picker Plus"
placement = "overlay"
command = ["./target/release/herdr-picker-plus", "ui"]
