# Hunk config — https://www.npmjs.com/package/hunkdiff
# Every key is optional; delete a line to fall back to the default.

theme = "catppuccin-latte"        # built-in theme id, "auto" (match terminal bg), or "custom"
mode = "auto"         # auto, split, stack
vcs = "git"           # git, jj, sl
watch = false
exclude_untracked = false
line_numbers = true
wrap_lines = false
menu_bar = true
agent_notes = false
transparent_background = false
